name: Build and Upload CommonTgService

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: ["master", "main"]

concurrency:
  group: common-tg-service-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine branch name
        run: echo "BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build NestJS application
        run: npm run build

      - name: Build single deployable artifact
        run: npm run webpack -- --config ./webpack-prod.config.ts

      - name: Upload build
        if: ${{ github.event_name == 'push' }}
        run: npm run upload-build -- "$BRANCH_NAME"
        env:
          BUILDS_REPO_TOKEN: ${{ secrets.BUILDS_REPO_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
